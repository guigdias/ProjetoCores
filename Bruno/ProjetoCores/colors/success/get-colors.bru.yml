info:
  name: get-colors.bru
  type: http
  seq: 1

http:
  method: GET
  url: https://localhost:7294/api/color
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body
      operator: isNotEmpty
    - expression: res.body[0].red
      operator: isNumber
    - expression: res.body[0].green
      operator: isNumber
    - expression: res.body[0].blue
      operator: isNumber

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
